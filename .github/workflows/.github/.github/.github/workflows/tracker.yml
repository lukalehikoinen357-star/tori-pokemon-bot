name: Pokémon Card Tracker
on:
  schedule:
    - cron: '*/5 * * * *' # Tells GitHub to automatically run your bot every 5 minutes

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: pip install cloudscraper beautifulsoup4 requests

      - name: Run Tracker Script
        run: python main.py
